name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Read package metadata
        id: package_meta
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const scope = pkg.name.startsWith("@") ? pkg.name.split("/")[0] : "";

          console.log(`name=${pkg.name}`);
          console.log(`version=${pkg.version}`);
          console.log(`scope=${scope}`);
          NODE

      - name: Verify tag matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${{ steps.package_meta.outputs.version }}" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version ${{ steps.package_meta.outputs.version }}."
            exit 1
          fi

      - name: Setup npm registry auth
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup GitHub Packages auth
        if: ${{ steps.package_meta.outputs.scope != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: ${{ steps.package_meta.outputs.scope }}

      - name: Publish to GitHub Packages
        if: ${{ steps.package_meta.outputs.scope != '' }}
        run: npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
